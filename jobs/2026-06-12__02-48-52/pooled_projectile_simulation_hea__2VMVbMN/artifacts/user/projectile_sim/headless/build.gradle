plugins {
    id 'java'
    id 'application'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

application {
    mainClass = 'com.simulation.ProjectileLauncher'
}

// Suppress the Gradle "run" task from logging the "Welcome to Gradle" banner
// and keep stdout clean so only our simulation output reaches the file.
run {
    standardInput = System.in
}

ext.gdxVersion = '1.14.2'

dependencies {
    implementation "com.badlogicgames.gdx:gdx:${gdxVersion}"
    implementation "com.badlogicgames.gdx:gdx-backend-headless:${gdxVersion}"
    runtimeOnly    "com.badlogicgames.gdx:gdx-platform:${gdxVersion}:natives-desktop"
}
