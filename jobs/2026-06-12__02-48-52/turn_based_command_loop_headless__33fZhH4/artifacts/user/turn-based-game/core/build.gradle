// core module — game logic; no OpenGL, no window dependencies
plugins {
    id 'java-library'
}

dependencies {
    // Core libGDX API (interfaces, Gdx.* statics, Input.Keys, etc.)
    api "com.badlogicgames.gdx:gdx:${gdxVersion}"

    // HeadlessApplication and MockInput live here — needed so core can
    // compile against MockInput for the ScriptedInput subclass.
    api "com.badlogicgames.gdx:gdx-backend-headless:${gdxVersion}"
}
