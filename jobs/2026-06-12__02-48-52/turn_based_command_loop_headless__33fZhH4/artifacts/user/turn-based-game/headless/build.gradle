// headless module — bootstrap / launcher only
plugins {
    id 'application'
}

application {
    mainClass = 'com.dungeoncraft.headless.HeadlessLauncher'
}

dependencies {
    implementation project(':core')

    // Headless backend (HeadlessApplication, MockAudio, MockGraphics, …)
    implementation "com.badlogicgames.gdx:gdx-backend-headless:${gdxVersion}"

    // Native stubs required at runtime even for headless
    runtimeOnly "com.badlogicgames.gdx:gdx-platform:${gdxVersion}:natives-desktop"
}
