openapi: 3.0.3
info:
  title: Products API
  version: 1.0.0
  description: A minimal Products API used for testing the Speakeasy merge command.
servers:
  - url: https://api.example.com/products-svc
paths:
  /products:
    get:
      operationId: listProducts
      summary: List all products
      responses:
        '200':
          description: A list of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          format: float
