openapi: 3.0.3
info:
  title: Products API
  version: 1.0.0
  description: |-
    A minimal Users API used for testing the Speakeasy merge command.
    A minimal Products API used for testing the Speakeasy merge command.
paths:
  /users:
    get:
      operationId: listUsers
      summary: List all users
      responses:
        '200':
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
      servers:
        - url: https://api.example.com/users-svc
  /products:
    get:
      operationId: listProducts
      summary: List all products
      servers:
        - url: https://api.example.com/products-svc
      responses:
        "200":
          description: A list of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          format: float
      required:
        - id
        - name
