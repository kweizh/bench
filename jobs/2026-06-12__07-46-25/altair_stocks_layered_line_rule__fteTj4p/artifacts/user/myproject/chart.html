<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/stocks.csv"}, "mark": {"type": "line"}, "encoding": {"x": {"field": "date", "type": "temporal"}, "y": {"field": "price", "type": "quantitative"}}, "transform": [{"filter": "(datum.symbol === 'GOOG')"}]}, {"data": {"name": "empty"}, "mark": {"type": "rule", "color": "red", "strokeDash": [4, 4]}, "encoding": {"y": {"datum": 300}}}, {"data": {"name": "empty"}, "mark": {"type": "rule", "color": "gray"}, "encoding": {"x": {"datum": {"day": 1, "month": 10, "year": 2008}}}}, {"data": {"name": "empty"}, "mark": {"type": "text", "align": "left", "dx": 5, "dy": -100, "fontSize": 12, "fontWeight": "bold"}, "encoding": {"text": {"value": "Crisis"}, "x": {"datum": {"day": 1, "month": 10, "year": 2008}}, "y": {"datum": 350}}}], "height": 300, "width": 600, "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json", "datasets": {"empty": [{}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
