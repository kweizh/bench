plugins {
    id 'application'
}

application {
    mainClass = 'com.example.pixmaprenderer.HeadlessPixmapRenderer'
}

def gdxVersion = '1.14.2'

dependencies {
    implementation "com.badlogicgames.gdx:gdx:${gdxVersion}"
    implementation "com.badlogicgames.gdx:gdx-backend-headless:${gdxVersion}"
    runtimeOnly "com.badlogicgames.gdx:gdx-platform:${gdxVersion}:natives-desktop"
}

tasks.register('render', JavaExec) {
    group = 'application'
    description = 'Runs the headless Pixmap renderer.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = application.mainClass

    doFirst {
        if (!project.hasProperty('inputFile') || !project.hasProperty('outputFile')) {
            throw new GradleException('render requires -PinputFile=<path> and -PoutputFile=<path>')
        }
        args = [project.property('inputFile').toString(), project.property('outputFile').toString()]
    }
}
