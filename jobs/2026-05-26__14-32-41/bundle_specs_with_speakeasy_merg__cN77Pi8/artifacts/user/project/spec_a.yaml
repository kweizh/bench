openapi: 3.0.3
info:
  title: Users API
  version: 1.0.0
  description: A minimal Users API used for testing the Speakeasy merge command.
servers:
  - url: https://api.example.com/users-svc
paths:
  /users:
    get:
      operationId: listUsers
      summary: List all users
      responses:
        '200':
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
