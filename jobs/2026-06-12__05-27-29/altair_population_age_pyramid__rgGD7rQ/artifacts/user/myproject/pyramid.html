<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"url": "https://vega.github.io/vega-datasets/data/population.json"}, "mark": {"type": "bar"}, "encoding": {"color": {"field": "sex", "legend": {"labelExpr": "datum.value == 1 ? 'Male' : 'Female'", "title": "Sex"}, "scale": {"domain": [1, 2], "range": ["steelblue", "salmon"]}, "type": "nominal"}, "x": {"axis": {"format": ",", "labelExpr": "abs(datum.value)", "title": "Population"}, "field": "people_signed", "type": "quantitative"}, "y": {"field": "age", "sort": "descending", "title": "Age", "type": "ordinal"}}, "params": [{"name": "param_ef1d0f37fcab51ad", "bind": {"input": "select", "options": [1850, 1860, 1870, 1880, 1890, 1900, 1910, 1920, 1930, 1940, 1950, 1960, 1970, 1980, 1990, 2000], "name": "Year: "}, "value": 1980}], "transform": [{"calculate": "datum.sex == 1 ? -datum.people : datum.people", "as": "people_signed"}, {"filter": "(datum.year === param_ef1d0f37fcab51ad)"}], "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
