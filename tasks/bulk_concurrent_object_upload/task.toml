version = "1.0"

[metadata]
tags = ["tigris", "requires_cloud_integration"]
[environment]
build_timeout_sec = 600
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
TIGRIS_STORAGE_ACCESS_KEY_ID = "${TIGRIS_STORAGE_ACCESS_KEY_ID}"
TIGRIS_STORAGE_SECRET_ACCESS_KEY = "${TIGRIS_STORAGE_SECRET_ACCESS_KEY}"
AWS_ENDPOINT_URL_S3 = "https://t3.storage.dev"

[agent]
timeout_sec = 600

[verifier]
timeout_sec = 600

[verifier.env]
POCHI_LOG = "debug"
TIGRIS_STORAGE_ACCESS_KEY_ID = "${TIGRIS_STORAGE_ACCESS_KEY_ID}"
TIGRIS_STORAGE_SECRET_ACCESS_KEY = "${TIGRIS_STORAGE_SECRET_ACCESS_KEY}"
AWS_ENDPOINT_URL_S3 = "https://t3.storage.dev"
POCHI_API_KEY = "${POCHI_API_KEY}"

[solution.env]
