version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_API_KEY = "${POCHI_API_KEY}"
KNOCK_SERVICE_TOKEN = "${KNOCK_SERVICE_TOKEN}"
KNOCK_API_TOKEN = "${KNOCK_API_TOKEN}"
KNOCK_PUBLIC_API_TOKEN = "${KNOCK_PUBLIC_API_TOKEN}"
KNOCK_INAPP_FEED_CHANNEL_ID = "${KNOCK_INAPP_FEED_CHANNEL_ID}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
KNOCK_SERVICE_TOKEN = "${KNOCK_SERVICE_TOKEN}"
KNOCK_API_TOKEN = "${KNOCK_API_TOKEN}"
KNOCK_PUBLIC_API_TOKEN = "${KNOCK_PUBLIC_API_TOKEN}"
KNOCK_INAPP_FEED_CHANNEL_ID = "${KNOCK_INAPP_FEED_CHANNEL_ID}"
POCHI_API_KEY = "${POCHI_API_KEY}"

[solution.env]

