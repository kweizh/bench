version = "1.0"

[metadata]
tags = ["langfuse", "requires_cloud_integration"]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_API_KEY = "${POCHI_API_KEY}"
LANGFUSE_PUBLIC_KEY = "${LANGFUSE_PUBLIC_KEY}"
LANGFUSE_SECRET_KEY = "${LANGFUSE_SECRET_KEY}"
LANGFUSE_BASE_URL = "${LANGFUSE_BASE_URL}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
LANGFUSE_PUBLIC_KEY = "${LANGFUSE_PUBLIC_KEY}"
LANGFUSE_SECRET_KEY = "${LANGFUSE_SECRET_KEY}"
LANGFUSE_BASE_URL = "${LANGFUSE_BASE_URL}"

[solution.env]

