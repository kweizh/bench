version = "1.0"

[metadata]
tags = ["apideck", "requires_cloud_integration"]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_API_KEY = "${POCHI_API_KEY}"
APIDECK_APP_ID = "${APIDECK_APP_ID}"
APIDECK_API_KEY = "${APIDECK_API_KEY}"
APIDECK_CONSUMER_ID = "${APIDECK_CONSUMER_ID}"
APIDECK_ISSUE_TRACKING_COLLECTION_ID = "${APIDECK_ISSUE_TRACKING_COLLECTION_ID}"
APIDECK_FILE_STORAGE_DRIVE_NAME = "${APIDECK_FILE_STORAGE_DRIVE_NAME}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
APIDECK_APP_ID = "${APIDECK_APP_ID}"
APIDECK_API_KEY = "${APIDECK_API_KEY}"
APIDECK_CONSUMER_ID = "${APIDECK_CONSUMER_ID}"
APIDECK_ISSUE_TRACKING_COLLECTION_ID = "${APIDECK_ISSUE_TRACKING_COLLECTION_ID}"
APIDECK_FILE_STORAGE_DRIVE_NAME = "${APIDECK_FILE_STORAGE_DRIVE_NAME}"

[solution.env]

